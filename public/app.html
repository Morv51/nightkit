<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NightKit — Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
<script src="/mp4-muxer.js"></script>
</head>
<body>

<!-- OVERLAY -->
<div class="overlay" id="ov">
  <div class="ring"><div class="ring-n">N</div></div>
  <div class="ov-title">Flyer wird generiert…</div>
  <div class="ov-dots"><div class="ov-dot"></div><div class="ov-dot"></div><div class="ov-dot"></div></div>
  <div class="ov-timer" id="ovTimer"></div>
</div>

<!-- TOPBAR -->
<header class="topbar">
  <a class="logo" href="/">
    <div class="logo-icon">
      <svg viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12M4 2.5L10 11.5M10 2.5L4 11.5" stroke="#0c0c0c" stroke-width="1.8" stroke-linecap="round"/></svg>
    </div>
    <span class="logo-name">NightKit</span>
  </a>
  <a class="topbar-back" href="/">← Zurück zur Übersicht</a>
</header>

<div class="app">

  <!-- ── COL 1: SIDEBAR FORM ── -->
  <aside class="sidebar">
    <div class="sidebar-scroll">

      <div class="sec-label">Event</div>
      <div class="field"><label>Prefix</label><input id="fPrefix" placeholder="z. B. 5 Jahre"></div>
      <div class="field"><label>Event-Name</label><input id="fName" value="Black Friday"></div>
      <div class="field"><label>Edition / Banner</label><input id="fGenre" value="Halloween Edition"></div>
      <div class="row">
        <div class="field"><label>Wochentag</label><input id="fDay" value="Samstag"></div>
        <div class="field"><label>Datum</label><input id="fDate" value="30.06.2026"></div>
      </div>
      <div class="field"><label>DJs / Acts</label><input id="fDj" value="Crazy Cutz, Marveles" placeholder="kommagetrennt"></div>

      <div class="sec-divider"></div>
      <div class="sec-label">Details</div>
      <div class="row">
        <div class="field"><label>Uhrzeit</label><input id="fTime" value="23:00"></div>
        <div class="field"><label>Eintritt</label><input id="fEntry" value="15€"></div>
      </div>
      <div class="field"><label>Website</label><input id="fContact" value="www.crazy-cutz.de"></div>

    </div>
  </aside>

  <!-- ── COL 2: TEMPLATE PICKER ── -->
  <main class="center">
    <div class="center-head">
      <div class="center-title">Template auswählen</div>
      <div class="cat-tabs" id="catTabs">
        <button class="cat-tab active" data-cat="alle">Alle</button>
        <button class="cat-tab" data-cat="techno">Techno</button>
        <button class="cat-tab" data-cat="house">House</button>
        <button class="cat-tab" data-cat="hiphop">Hip-Hop</button>
        <button class="cat-tab" data-cat="rnb">R&amp;B</button>
        <button class="cat-tab" data-cat="halloween">Halloween</button>
        <button class="cat-tab" data-cat="minimal">Minimal</button>
      </div>
    </div>
    <div class="center-body">
      <div class="tpl-grid" id="tplGrid"></div>
      <div class="empty-cat" id="emptyCat">Keine Templates in dieser Kategorie</div>
    </div>
  </main>

  <!-- ── COL 3: PREVIEW + BUTTON ── -->
  <div class="panel">
    <div class="panel-body" id="panelBody">

      <!-- STATE: Preview (default) -->
      <div id="statePreview">
        <div class="preview-wrap">
          <div class="preview-canvas-wrap">
            <canvas id="previewCanvas" width="400" height="534"></canvas>
          </div>
          <div class="preview-lbl">Vorschau · Live</div>
        </div>
      </div>

      <!-- STATE: Result (after generation) -->
      <div id="stateResult" style="display:none">
        <div style="display:flex;flex-direction:column;gap:10px">
          <div class="result-img-wrap">
            <img id="resultImg" alt="Ergebnis">
          </div>
          <div class="result-btns">
            <button class="rbtn rbtn-primary" id="btnDlPng">↓ PNG</button>
            <button class="rbtn rbtn-primary" id="btnDlJpg">↓ JPG</button>
            <button class="rbtn rbtn-ghost" id="copyBtn">⎘ Kopieren</button>
          </div>
          <button class="rbtn rbtn-regen" id="btnReset">↺ Neues Template wählen</button>

          <!-- History -->
          <div class="hist-wrap" id="histWrap" style="display:none">
            <div class="hist-lbl">Zuletzt</div>
            <div class="hist-row" id="histRow"></div>
          </div>

          <!-- Video Export -->
          <div class="video-section">
            <div class="video-head">
              <span>Video Export</span>
              <span class="video-chevron" id="videoChevron">▾</span>
            </div>
            <div class="video-body" id="videoBody">
              <div class="style-row"></div>
              <div class="video-controls">
                <button class="rbtn rbtn-ghost" id="btnPv">▶ Preview</button>
                <button class="rbtn rbtn-primary" id="exportBtn">↓ Video</button>
                <span class="video-status" id="videoStatus"></span>
              </div>
              <div class="pv-canvas-wrap" id="previewWrap">
                <canvas id="videoCanvas"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /panel-body -->

    <div class="panel-foot">
      <button class="gen-btn" id="genBtn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L8.5 5.5L13 7L8.5 8.5L7 13L5.5 8.5L1 7L5.5 5.5L7 1Z" fill="#0c0c0c"/></svg>
        <span id="genTxt">Flyer generieren</span>
      </button>
      <div class="err" id="errBox"></div>
    </div>
  </div><!-- /panel -->

</div><!-- /app -->

<script type="module" src="/js/main.js"></script>

</body>
</html>
