<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NightKit</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#08080f;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.logo-mark{width:26px;height:26px;background:#FF2D55;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px}
.logo-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:18px;width:100%;max-width:520px;margin-bottom:12px}
.card-title{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:.7px;text-transform:uppercase;margin-bottom:12px}
.template-img{width:100%;border-radius:8px;display:block}
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;color:rgba(255,255,255,0.38);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.field input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:7px;padding:9px 12px;color:#fff;font-size:13px;font-family:inherit;outline:none}
.field input:focus{border-color:rgba(255,45,85,0.5)}
.field input::placeholder{color:rgba(255,255,255,0.18)}
.row{display:flex;gap:10px}.row .field{flex:1}
.gen-btn{width:100%;max-width:520px;padding:14px;background:linear-gradient(135deg,#FF2D55,#cc1a3d);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:7px;transition:opacity .2s}
.gen-btn:disabled{opacity:.4;cursor:not-allowed}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.hint{font-size:11px;color:rgba(255,255,255,0.22);text-align:center;max-width:520px;margin-bottom:4px}
.err{background:rgba(255,60,60,0.07);border:1px solid rgba(255,60,60,0.18);border-radius:8px;padding:10px 12px;font-size:12px;color:#ff6b6b;display:none;width:100%;max-width:520px;margin-bottom:8px;word-break:break-word}
.result-wrap{width:100%;max-width:520px;display:none;flex-direction:column;gap:10px;margin-top:12px}
.result-img{width:100%;border-radius:10px;border:1px solid rgba(255,255,255,0.09)}
.dl-row{display:flex;gap:8px}
.dl-btn{flex:1;padding:9px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:7px;color:rgba(255,255,255,0.6);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.regen-btn{padding:9px 16px;background:rgba(255,45,85,0.1);border:1px solid rgba(255,45,85,0.28);border-radius:7px;color:#FF2D55;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.overlay{position:fixed;inset:0;z-index:999;background:rgba(8,8,15,0.93);backdrop-filter:blur(16px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.overlay.on{display:flex}
.ring{width:64px;height:64px;position:relative}
.ring::before{content:'';position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:#FF2D55;animation:spin .8s linear infinite}
.ring-n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#FF2D55}
.ov-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.ov-sub{font-size:12px;color:rgba(255,255,255,0.4);text-align:center}
</style>
</head>
<body>
<div class="overlay" id="ov"><div class="ring"><div class="ring-n">N</div></div><div class="ov-title" id="ovTitle">Generiert...</div><div class="ov-sub" id="ovSub">Dauert ca. 10-20 Sekunden</div></div>
<div class="logo"><div class="logo-mark">N</div><span class="logo-name">NightKit</span></div>
<div class="card"><div class="card-title">Ausgewahltes Template</div><img class="template-img" id="tplImg" alt="Template"></div>
<div class="card">
  <div class="card-title">Event Details</div>
  <div class="field"><label>Event-Name *</label><input id="fName" placeholder="Black Friday Night"></div>
  <div class="field"><label>Venue *</label><input id="fVenue" placeholder="Club 42 Fieber"></div>
  <div class="row"><div class="field"><label>Wochentag</label><input id="fDay" placeholder="Samstag"></div><div class="field"><label>Datum *</label><input id="fDate" placeholder="22.05.2026"></div></div>
  <div class="row"><div class="field"><label>Uhrzeit</label><input id="fTime" placeholder="23:00"></div><div class="field"><label>Eintritt</label><input id="fEntry" placeholder="15 EUR"></div></div>
  <div class="field"><label>DJ / Act</label><input id="fDj" placeholder="Crazy Cutz"></div>
  <div class="field"><label>Genre</label><input id="fGenre" placeholder="Urban HipHop Black"></div>
  <div class="field"><label>Website</label><input id="fContact" placeholder="www.club42fieber.de"></div>
  <div class="field"><label>Extras</label><input id="fExtras" placeholder="Guestlist bis 0:00"></div>
</div>
<button class="gen-btn" id="genBtn" onclick="generate()"><span id="genTxt">Generieren</span></button>
<div class="err" id="errBox"></div>
<div class="hint" id="hint">Text wird auf Template gerendert</div>
<div class="result-wrap" id="resultWrap">
  <img class="result-img" id="resultImg" alt="Flyer">
  <div class="dl-row"><button class="regen-btn" onclick="generate()">Neu</button><button class="dl-btn" onclick="dl('png')">PNG</button><button class="dl-btn" onclick="dl('jpg')">JPG</button></div>
</div>

var last=null;
function v(id){return document.getElementById(id).value.trim();}
function showErr(m){var e=document.getElementById("errBox");e.style.display="block";e.textContent=m;}
function clearErr(){document.getElementById("errBox").style.display="none";}

function renderCanvas(bgB64,ev,cb){
  var img=new Image();
  img.onload=function(){
    var c=document.createElement("canvas");
    c.width=img.width;c.height=img.height;
    var W=img.width,H=img.height;
    var ctx=c.getContext("2d");
    ctx.drawImage(img,0,0);
    var name=ev.name||"",venue=ev.venue||"";
    var day=(ev.day||"SAMSTAG").toUpperCase();
    var date=ev.date||"",dj=ev.dj||"",genre=ev.genre||"";
    var time=ev.time||"",entry=ev.entry||"";
    var det=[];
    if(time)det.push("Einlass: "+time+" Uhr");
    if(entry)det.push("Eintritt: "+entry);
    var details=det.join(" | ");
    function sh(c,b,ox,oy){ctx.shadowColor=c||"rgba(0,0,0,0.95)";ctx.shadowBlur=b||18;ctx.shadowOffsetX=ox||2;ctx.shadowOffsetY=oy||3;}
    function ns(){ctx.shadowColor="transparent";ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;}
    // TOP LEFT
    ctx.textAlign="left";
    ctx.fillStyle="#fff";
    ctx.font="800 "+Math.round(W*0.042)+"px Syne,sans-serif";
    sh();ctx.fillText(name.toUpperCase(),Math.round(W*0.055),Math.round(H*0.185));ns();
    if(genre){
      ctx.fillStyle="rgba(255,255,255,0.78)";
      ctx.font="500 "+Math.round(W*0.022)+"px DM Sans,sans-serif";
      sh("rgba(0,0,0,0.9)",10,1,1);
      ctx.fillText(genre.toUpperCase(),Math.round(W*0.055),Math.round(H*0.228));ns();
    }
    if(dj){
      ctx.fillStyle="rgba(255,255,255,0.55)";
      ctx.font="400 "+Math.round(W*0.02)+"px DM Sans,sans-serif";
      sh("rgba(0,0,0,0.9)",8);
      ctx.fillText(dj,Math.round(W*0.055),Math.round(H*0.265));ns();
    }
    // TOP RIGHT date box
    var bW=Math.round(W*0.22),bX=Math.round(W*0.725),bY=Math.round(H*0.06);
    ctx.textAlign="center";
    ctx.fillStyle="rgba(255,255,255,0.92)";
    ctx.font="700 "+Math.round(W*0.022)+"px DM Sans,sans-serif";
    sh("rgba(0,0,0,0.95)",10);ctx.fillText(day,bX+bW/2,bY+Math.round(H*0.026));ns();
    var bH=Math.round(H*0.08),bYy=bY+Math.round(H*0.032);
    ctx.fillStyle="rgba(0,0,0,0.3)";ctx.fillRect(bX,bYy,bW,bH);
    ctx.strokeStyle="rgba(255,255,255,0.92)";ctx.lineWidth=2;ctx.strokeRect(bX,bYy,bW,bH);
    ctx.fillStyle="#fff";ctx.font="800 "+Math.round(W*0.052)+"px Syne,sans-serif";
    sh("rgba(0,0,0,0.9)",12);ctx.fillText(date,bX+bW/2,bYy+Math.round(bH*0.75));ns();
    // BOTTOM RIGHT
    ctx.textAlign="right";
    ctx.fillStyle="rgba(255,255,255,0.92)";
    ctx.font="800 "+Math.round(W*0.032)+"px Syne,sans-serif";
    sh("rgba(0,0,0,0.9)",12);ctx.fillText(venue,Math.round(W*0.945),Math.round(H*0.875));ns();
    if(dj){
      ctx.fillStyle="rgba(255,255,255,0.5)";
      ctx.font="400 "+Math.round(W*0.018)+"px DM Sans,sans-serif";
      sh("rgba(0,0,0,0.9)",8);ctx.fillText("DJ: "+dj,Math.round(W*0.945),Math.round(H*0.905));ns();
    }
    // BOTTOM CENTER
    if(details){
      ctx.textAlign="center";ctx.fillStyle="rgba(255,255,255,0.45)";
      ctx.font="400 "+Math.round(W*0.018)+"px DM Sans,sans-serif";
      sh("rgba(0,0,0,0.8)",8);ctx.fillText(details,W/2,Math.round(H*0.938));ns();
    }
    cb(c.toDataURL("image/png"));
  };
  img.src="data:image/png;base64,"+bgB64;
}

function generate(){
  if(!v("fName")||!v("fDate")){showErr("Bitte Event-Name und Datum ausfullen.");return;}
  clearErr();
  var btn=document.getElementById("genBtn");
  document.getElementById("genTxt").innerHTML='<span class="spinner"></span>';
  btn.disabled=true;
  document.getElementById("ov").classList.add("on");
  document.getElementById("ovTitle").textContent="Hintergrund vorbereiten...";
  document.getElementById("ovSub").textContent="Dauert ca. 10-20 Sekunden";
  document.getElementById("resultWrap").style.display="none";
  var ev={name:v("fName"),venue:v("fVenue"),day:v("fDay"),date:v("fDate"),
    time:v("fTime"),entry:v("fEntry"),dj:v("fDj"),genre:v("fGenre"),
    contact:v("fContact"),extras:v("fExtras")};
  fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(ev)})
  .then(function(res){return res.text().then(function(t){return {ok:res.ok,status:res.status,text:t};});})
  .then(function(r){
    if(!r.ok){
      var msg="Fehler "+r.status+": "+r.text.substring(0,200);
      try{var j=JSON.parse(r.text);if(j.error)msg=j.error;}catch(e){}
      throw new Error(msg);
    }
    var data=JSON.parse(r.text);
    if(!data.background_b64)throw new Error("Kein Hintergrund: "+r.text.substring(0,100));
    document.getElementById("ovTitle").textContent="Text wird gerendert...";
    renderCanvas(data.background_b64,data.event,function(dataUrl){
      last=dataUrl;
      document.getElementById("resultImg").src=last;
      document.getElementById("resultWrap").style.display="flex";
      document.getElementById("hint").textContent="Flyer fertig";
      document.getElementById("ov").classList.remove("on");
      document.getElementById("genTxt").textContent="Generieren";
      btn.disabled=false;
    });
  })
  .catch(function(e){
    showErr(e.message||"Fehler.");
    document.getElementById("ov").classList.remove("on");
    document.getElementById("genTxt").textContent="Generieren";
    btn.disabled=false;
  });
}

function dl(fmt){
  if(!last)return;
  var name=(v("fName")||"flyer").replace(/\s+/g,"-").toLowerCase();
  var a=document.createElement("a");a.download=name+"."+fmt;a.href=last;a.click();
}
</script>
